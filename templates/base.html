<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}どこで見れる? | アニメ配信検索{% endblock %}</title>
<meta name="description" content="{% block description %}アニメのタイトルから、Abema・Netflix・dアニメストアなど正規配信サービスをまとめて検索できます。{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="alternate" hreflang="en" href="{{ request.url_root.rstrip('/') }}{{ en_path|default('/en/') }}">
<link rel="alternate" hreflang="ja" href="{{ request.url_root.rstrip('/') }}{{ request.path }}">
</head>
<body>

<header class="topbar">
  <a href="/" class="logo">DOKOMIRU<span class="logo-dot">.</span></a>
  <form class="search-form" action="/" method="get">
    <input type="text" name="q" placeholder="作品名で検索…" value="{{ query|default('') }}">
    <button type="submit">検索</button>
  </form>
  <a class="lang-switch" href="{{ en_path|default('/en/') }}">English</a>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <nav class="footer-nav">
    <a href="/privacy">プライバシーポリシー</a>
    <span class="footer-sep">・</span>
    <a href="/contact">お問い合わせ</a>
  </nav>
  <p>© 2026 DOKOMIRU — 配信情報は変更される場合があります。最新情報は各サービスの公式サイトでご確認ください。</p>
</footer>

</body>
</html>
