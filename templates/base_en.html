<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="xFPvFCPurrc8gpTsxuK9cZcsz0wgLgoXoFuMvKEbDrI" />
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7059621726238022"
     crossorigin="anonymous"></script>
<title>{% block title %}Where to Watch Anime | DOKOMIRU{% endblock %}</title>
<meta name="description" content="{% block description %}Find out where to legally stream any anime — Crunchyroll, Netflix, Disney+, Hulu, and more, all in one search.{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="alternate" hreflang="ja" href="{{ request.url_root.rstrip('/') }}{{ ja_path|default('/') }}">
<link rel="alternate" hreflang="en" href="{{ request.url_root.rstrip('/') }}{{ request.path }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="DOKOMIRU">
<meta property="og:locale" content="en_US">
<meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
<meta property="og:description" content="{% block og_description %}{{ self.description() }}{% endblock %}">
<meta property="og:url" content="{{ request.url_root.rstrip('/') }}{{ request.path }}">
<meta property="og:image" content="{{ request.url_root.rstrip('/') }}{{ url_for('static', filename='og-image-en.png') }}">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>

<header class="topbar">
  <a href="/en/" class="logo">DOKOMIRU<span class="logo-dot">.</span></a>
  <form class="search-form" action="/en/" method="get">
    <input type="text" name="q" placeholder="Search by title…" value="{{ query|default('') }}">
    <button type="submit">Search</button>
  </form>
  <a class="lang-switch" href="{{ ja_path|default('/') }}">日本語</a>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <nav class="footer-nav">
    <a href="/en/genres">Genres</a>
    <span class="footer-sep">・</span>
    <a href="/en/about">About</a>
    <span class="footer-sep">・</span>
    <a href="/en/privacy">Privacy Policy</a>
    <span class="footer-sep">・</span>
    <a href="/en/contact">Contact</a>
  </nav>
  <p>© 2026 DOKOMIRU — Streaming availability may change. Please check each service's official site for the latest information.</p>
</footer>

</body>
</html>
